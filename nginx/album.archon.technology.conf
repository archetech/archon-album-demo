# album.archon.technology nginx configuration

upstream album_backend {
    server 127.0.0.1:4260;
}

server {
    listen 80;
    server_name album.archon.technology;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name album.archon.technology;

    ssl_certificate /etc/letsencrypt/live/album.archon.technology/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/album.archon.technology/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Root for static files
    root /var/www/album.archon.technology/public;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://album_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Session cookies
        proxy_set_header Cookie $http_cookie;
    }

    # Static files (React build)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Block sensitive files
    location ~ /\. {
        deny all;
    }
}
